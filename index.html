<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FC Schenkon Social Assets</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, Helvetica, sans-serif;
      color: #161616;
      background: #f5f5f5;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(720px, calc(100vw - 32px));
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 32px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <h1>FC Schenkon Social Assets</h1>
    <p>Public asset host for generated FC Schenkon social media flyers.</p>
    <p>Generated files will be published under stable public paths for Instagram and TikTok API usage.</p>
  </main>
</body>
</html>
